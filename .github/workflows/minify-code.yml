name: 自动压缩代码并推送至min分支

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minify-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 安装压缩工具
        run: |
          npm install -g html-minifier-terser@7.2.0 clean-css-cli@5.6.3 terser@5.26.0
          echo "✅ 压缩工具安装完成"

      - name: 初始化git配置
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
      - name: 检查并创建min分支（如果不存在）
        run: |
          git fetch origin
          if ! git show-ref --verify --quiet refs/remotes/origin/min; then
            echo "⚠️ 远程min分支不存在，创建空分支"
            git checkout --orphan min
            git rm -rf .
            git commit --allow-empty -m "Initial min branch"
            git push origin min
            git checkout main
          fi

      - name: 切换到main分支并确保最新
        run: |
          git checkout main
          git pull origin main

      - name: 输出帮助
        run: |
          html-minifier-terser --help
          cleancss --help
          terser --help

      - name: 在main分支上生成压缩文件
        run: |
          # 初始化dist目录
          rm -rf dist && mkdir -p dist
          echo "✅ 清理并重建dist目录完成"
          
          # 处理所有文件
          find . -type f \
            ! -path "./node_modules/*" \
            ! -path "./dist/*" \
            ! -path "./.vscode/*" \
            ! -path "./.git/*" | while IFS= read -r file; do
              output="dist/${file#./}"
              mkdir -p "$(dirname "$output")"

              case "$file" in
                *.html)
                  echo "🔧 压缩HTML: $file"
                  html-minifier-terser \
                    --collapse-whitespace \
                    --remove-comments \
                    --remove-script-type-attributes \
                    --remove-style-link-type-attributes \
                    -o "$output" "$file"
                  ;;
                *.css)
                  echo "🔧 压缩CSS: $file"
                  cleancss -O0 -o "$output" "$file"
                  ;;
                *.js)
                  echo "🔧 压缩JS: $file"
                  terser "$file" \
                    -o "$output"
                  ;;
                *.json)
                  echo "🔧 压缩JSON: $file"
                  node -e "
                    const fs = require('fs');
                    try {
                      const data = JSON.parse(fs.readFileSync('$file', 'utf8'));
                      fs.writeFileSync('$output', JSON.stringify(data));
                    } catch (e) {
                      console.error('❌ JSON解析失败:', '$file', e.message);
                      process.exit(1);
                    }
                  "
                  ;;
                *)
                  echo "📤 复制静态资源: $file"
                  cp -f "$file" "$output"
                  ;;
              esac
            done
          echo "✅ 所有文件处理完成"

      - name: 保存dist目录到临时位置
        run: |
          cp -rf dist /tmp/
          echo "✅ dist目录已保存到临时位置"

      - name: 切换到min分支并更新
        run: |
          git checkout -B min origin/min
          git clean -fdx --exclude=.git
          echo "✅ 切换到min分支并清理完成"

      - name: 恢复dist目录并复制到min分支
        run: |
          # 恢复dist目录
          cp -rf /tmp/dist .
          echo "✅ dist目录已从临时位置恢复"
          
          # 复制dist目录内容到min分支根目录
          cp -rf dist/* .
          rm -rf dist
          
          # 检查是否有文件被复制
          echo "📋 复制完成后的文件列表："
          ls -la

      - name: 提交并推送更新
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️ 无代码变更，无需提交"
            exit 0
          fi

          commit_msg="[GHA] 修改：压缩：$(git log main -1 --pretty=format:'%s (%h)')呜~"
          git commit -m "$commit_msg"
          
          # 使用--force-with-lease确保安全推送
          git push origin min --force-with-lease
          echo "✅ 压缩代码已推送至min分支"
